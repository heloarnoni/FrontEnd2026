<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Infinity Bank</title>

<style>
body{background:#ffedd5;font-family:Arial;}
.card{background:#ea580c;color:white;padding:30px;width:350px;margin:auto;margin-top:100px;border-radius:10px;}
button{background:#fb923c;color:white;}
</style>
</head>
<body>

<div class="card">

    <h2>Infinity Bank</h2>

    <select id="bandeira">

        <option value="visa">Visa</option>
        <option value="master">Master</option>
        <option value="elo">Elo</option>

    </select>

    <input type="number" id="valor" placeholder="Valor da venda">

    <input type="number" id="parcelas" placeholder="Parcelas">

    <button id="simular">Simular</button>

    <div id="resultado"></div>

</div>

<script>

document.getElementById("simular").addEventListener("click", () => {

    const bandeira = document.getElementById("bandeira").value;

    const valor = Number(document.getElementById("valor").value);

    const parcelas = Number(document.getElementById("parcelas").value);

    let taxa = 0;

    switch(bandeira){

        case "visa":
            taxa = valor * 0.02;
            break;

        case "master":
            taxa = valor * 0.0185;
            break;

        case "elo":
            taxa = valor * 0.03;
            break;
    }

    const juros = valor * (0.0035 * parcelas);

    const taxaMensal = parcelas * 2;

    const total = valor + taxa + juros + taxaMensal;

    const valorParcela = total / parcelas;

    document.getElementById("resultado").innerHTML = `
        Taxa Bandeira: R$ ${taxa.toFixed(2)} <br>
        Juros: R$ ${juros.toFixed(2)} <br>
        Taxa Mensal: R$ ${taxaMensal.toFixed(2)} <br>
        Valor Parcela: R$ ${valorParcela.toFixed(2)}
    `;

});

</script>

</body>
</html>
