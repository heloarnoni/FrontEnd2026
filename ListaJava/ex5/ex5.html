<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista VIP</title>

<style>
body{background:#fce7f3;font-family:Arial;}
.card{background:#be185d;color:white;padding:30px;width:450px;margin:auto;margin-top:100px;border-radius:10px;}
button{background:#f472b6;color:white;}
</style>
</head>
<body>

<div class="card">

    <h2>Lista de Convidados VIP</h2>

    <input type="text" id="nome" placeholder="Digite o nome do convidado">

    <button id="adicionar">Adicionar</button>

    <ul id="lista"></ul>

</div>

<script>

const lista = document.getElementById("lista");

document.getElementById("adicionar").addEventListener("click", () => {

    const input = document.getElementById("nome");

    const nome = input.value.trim();

    if(nome === ""){
        alert("Digite um nome!");
        return;
    }

    const li = document.createElement("li");

    li.innerHTML = `
        <span>${nome}</span>

        <div class="botoes">

            <button class="concluir">Concluir</button>

            <button class="editar">Editar</button>

            <button class="excluir">Excluir</button>

        </div>
    `;

    lista.appendChild(li);

    input.value = "";

    li.querySelector(".concluir").addEventListener("click", () => {

        li.querySelector("span").classList.toggle("riscado");

    });

    li.querySelector(".editar").addEventListener("click", () => {

        const novoNome = prompt("Digite o novo nome:");

        if(novoNome){

            li.querySelector("span").textContent = novoNome;

        }

    });

    li.querySelector(".excluir").addEventListener("click", () => {

        li.remove();

    });

});

</script>

</body>
</html>
