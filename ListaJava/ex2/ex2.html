<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Conversor de Temperatura</title>

<style>
body{background:#dcfce7;font-family:Arial;}
.card{background:#166534;color:white;padding:30px;width:350px;margin:auto;margin-top:100px;border-radius:10px;}
button{background:#4ade80;color:white;}
</style>
</head>
<body>

<div class="card">

    <h2>Conversor de Temperatura</h2>

    <input type="number" id="celsius" placeholder="Celsius" step="0.1">

    <input type="number" id="fahrenheit" placeholder="Fahrenheit" step="0.1">

</div>

<script>

const celsius = document.getElementById("celsius");
const fahrenheit = document.getElementById("fahrenheit");

celsius.addEventListener("input", () => {

    if(celsius.value === ""){
        fahrenheit.value = "";
        return;
    }

    fahrenheit.value =
    ((Number(celsius.value) * 9/5) + 32).toFixed(2);

});

fahrenheit.addEventListener("input", () => {

    if(fahrenheit.value === ""){
        celsius.value = "";
        return;
    }

    celsius.value =
    ((Number(fahrenheit.value) - 32) * 5/9).toFixed(2);

});

</script>

</body>
</html>
