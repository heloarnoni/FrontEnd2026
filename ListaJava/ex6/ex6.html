<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crédito para Eventos</title>

<style>
body{background:#111827;font-family:Arial;}
.card{background:#1f2937;color:white;padding:30px;width:400px;margin:auto;margin-top:100px;border-radius:10px;}
button{background:#06b6d4;color:white;}
</style>
</head>
<body>

<div class="card">

    <h2>Crédito para Festas & Eventos</h2>

    <select id="pacote">

        <option value="standard">Standard</option>

        <option value="premium">Premium</option>

        <option value="deluxe">Infinity Deluxe</option>

    </select>

    <input type="number" id="pessoas" placeholder="Quantidade de pessoas">

    <button id="calcular">Calcular Orçamento</button>

    <div id="resultado"></div>

</div>

<script>

document.getElementById("calcular").addEventListener("click", () => {

    const pacote = document.getElementById("pacote").value;

    const pessoas = Number(document.getElementById("pessoas").value);

    let valorPacote = 0;

    switch(pacote){

        case "standard":
            valorPacote = 50;
            break;

        case "premium":
            valorPacote = 80;
            break;

        case "deluxe":
            valorPacote = 120;
            break;

    }

    const bruto = valorPacote * pessoas;

    const taxaServico = bruto * 0.10;

    let total = bruto + taxaServico;

    let desconto = 0;

    if(pessoas > 100){

        desconto = total * 0.05;

        total -= desconto;

    }

    document.getElementById("resultado").innerHTML = `
    
        Valor Bruto: R$ ${bruto.toFixed(2)} <br>

        Taxa de Serviço: R$ ${taxaServico.toFixed(2)} <br>

        Desconto: R$ ${desconto.toFixed(2)} <br>

        Total Final: R$ ${total.toFixed(2)}

    `;

});

</script>

</body>
</html>
