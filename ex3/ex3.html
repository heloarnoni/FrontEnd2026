<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Média Escolar</title>

<style>
body{background:#ede9fe;font-family:Arial;}
.card{background:#6d28d9;color:white;padding:30px;width:350px;margin:auto;margin-top:100px;border-radius:10px;}
button{background:#a78bfa;color:white;}
</style>
</head>
<body>

<div class="card">

    <h2>Média Escolar</h2>

    <input type="text" id="nome" placeholder="Nome do aluno">

    <input type="number" id="nota1" placeholder="Nota 1">

    <input type="number" id="nota2" placeholder="Nota 2">

    <input type="number" id="nota3" placeholder="Nota 3">

    <button id="calcular">Calcular Média</button>

    <p id="resultado"></p>

</div>

<script>

document.getElementById("calcular").addEventListener("click", () => {

    const nome = document.getElementById("nome").value;

    const n1 = Number(document.getElementById("nota1").value);
    const n2 = Number(document.getElementById("nota2").value);
    const n3 = Number(document.getElementById("nota3").value);

    const media = (n1 + n2 + n3) / 3;

    const resultado = document.getElementById("resultado");

    if(media >= 7){

        resultado.innerHTML =
        `${nome} está APROVADO(A) com média ${media.toFixed(2)}`;

        resultado.style.color = "blue";

    }
    else{

        const falta = 10 - media;

        resultado.innerHTML =
        `${nome} está em EXAME com média ${media.toFixed(2)}. Faltam ${falta.toFixed(2)} pontos para 10`;

        resultado.style.color = "green";

    }
    if(media<4){

        resultado.innerHTML =
        `${nome} está REPROVADO(A) com média ${media.toFixed(2)}`;

        resultado.style.color = "red";

    }

});

</script>

</body>
</html>
