<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validador de CPF</title>

<style>
body{background:#dbeafe;font-family:Arial;}
.card{background:#1e3a8a;color:white;padding:30px;width:350px;margin:auto;margin-top:100px;border-radius:10px;}
button{background:#60a5fa;color:white;}
</style>
</head>
<body>

<div class="card">

    <h2>Validador de CPF</h2>

    <input type="text" id="cpf" placeholder="Digite o CPF">

    <button id="validar">Validar</button>

    <p id="resultado"></p>

</div>

<script>

document.getElementById("validar").addEventListener("click", () => {

    const cpf = document.getElementById("cpf").value.replace(/\D/g, "");

    const resultado = document.getElementById("resultado");

    if(validarCPF(cpf)){
        resultado.innerHTML = "CPF Válido";
        resultado.style.color = "green";
    }
    else{
        resultado.innerHTML = "CPF Inválido";
        resultado.style.color = "red";
    }

});

function validarCPF(cpf){

    if(cpf.length !== 11) return false;

    let soma = 0;
    let resto;

    for(let i = 1; i <= 9; i++){
        soma += parseInt(cpf[i - 1]) * (11 - i);
    }

    resto = (soma * 10) % 11;

    if(resto === 10) resto = 0;

    if(resto !== parseInt(cpf[9])) return false;

    soma = 0;

    for(let i = 1; i <= 10; i++){
        soma += parseInt(cpf[i - 1]) * (12 - i);
    }

    resto = (soma * 10) % 11;

    if(resto === 10) resto = 0;

    return resto === parseInt(cpf[10]);
}

</script>

</body>
</html>
