<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pet Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-pink-50 min-h-screen flex flex-col" 
      style="background-image: url('bg.png'); 
             background-size: cover; 
             background-position: center; 
             background-repeat: no-repeat;">

    <div class="w-full flex items-center justify-start p-4 gap-4">
        
        <div class="avatar">
            
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                
                <img id="avatarSmall" src="b_n.png" alt="Avatar pequeno" />
           
            </div>
       
        </div>
        
        <input type="text" id="nomeCriatura" 
               placeholder="Nome da criatura..." 
               class="input input-secondary w-full max-w-xs"/>
    
            </div>

    <div class="flex flex-col items-center w-full px-4 flex-1">
        
        <img id="mainImage" 
             src="b_n.png" 
             alt="Criatura" 
             class="w-full max-w-md h-auto drop-shadow-2xl"/>
        
        <div class="mt-12 flex justify-center w-full">

            <img id="btnImage" 
                 src="btn.png" 
                 alt="Botão Alimentar" 
                 class="w-1/3 max-w-[180px] h-auto active:scale-95 transition cursor-pointer" 
                 onclick="alimentar()"/>

        </div>

    </div>

    <div class="fixed bottom-4 right-4 flex flex-col gap-3 z-50">

        <img id="btnChoque" 
             src="choque.png" 
             alt="Botão Secreto 1"
             class="w-12 h-12 active:scale-95 transition-all"
             onclick="mostrarGostosin()" />

        <img id="btnEmoji" 
             src="emoji.png" 
             alt="Botão Secreto 2"
             class="w-12 h-12 active:scale-95 transition-all"
             onclick="mostrarProfi()" />
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        
        <div class="relative max-w-md w-full px-4">
            
            <img id="modalImagem" 
                 src="" 
                 alt="Imagem Secreta"
                 class="w-full rounded-2xl shadow-2xl"/>
        
                </div>
   
            </div>
        
            <script src="script.js"></script>
        
</body>

</html>
